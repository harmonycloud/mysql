apiVersion: middleware.cn/v1
kind: MiddlewareActionBaseline
metadata:
  name: mysql-passive-switch
  nnotations:
    alias: "自动切换"
spec:
  baselineType: "OpsAction"
  actionType: "passive-switch"
  necessary:
    passiveSwitched: "bool"
  steps:
    - name: passive-switch
      cmd:
        command:
          - "kubectl"
          - "patch"
          - "mc"
          - "{{ .Globe.MiddlewareName }}"
          - "-n"
          - "{{ .Necessary.namespace }}"
          - "--type='json'"
          - '-p=''[{"op": "replace", "path": "/spec/passiveSwitched", "value": {{ .Necessary.passiveSwitched }} }]'''
