apiVersion: middleware.cn/v1
kind: MiddlewareConfiguration
metadata:
  name: mysql-alertrule
spec:
  template: |
    {{- if  .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
    {{- $useNewReplicaMetrics := semverCompare ">=8.4.0" .Values.version }}
    {{- $secondsBehindMetric := ternary "mysql_slave_status_seconds_behind_source" "mysql_slave_status_seconds_behind_master" $useNewReplicaMetrics }}
    {{- $ioRunningMetric := ternary "mysql_slave_status_replica_io_running" "mysql_slave_status_slave_io_running" $useNewReplicaMetrics }}
    {{- $sqlRunningMetric := ternary "mysql_slave_status_replica_sql_running" "mysql_slave_status_slave_sql_running" $useNewReplicaMetrics }}
    apiVersion: monitoring.coreos.com/v1
    kind: PrometheusRule
    metadata:
      labels:
        prometheus: k8s
        role: alert-rules
      name: {{ .Globe.Name }}
    spec:
      groups:
      - name: mysql-exporter
        rules:
        - alert: MySQLExporterDown
          annotations:
            message: "MySQL Exporter is down. (Namespace: {{ .Globe.Namespace }},  ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: up
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.MySQLExporterDown.silence }}
            silence: {{ .Values.alertRules.MySQLExporterDown.silence }}
            {{- end }}
          expr: up{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} == 0
          for: {{ .Values.alertRules.MySQLExporterDown.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLExporterDown.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
      - name: mysql-cluster
        rules:
        - expr: {{$secondsBehindMetric}}{service='{{ .Globe.Name }}'} - mysql_slave_status_sql_delay{service='{{ .Globe.Name }}'}
          record: mysql_slave_lag_seconds
        - alert: MySQLReplicationNotRunning
          annotations:
            message: "MySQL slave replication (IO or SQL) has been down for more than 5 minutes. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: {{$ioRunningMetric}}
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.MySQLReplicationNotRunning.silence }}
            silence: {{ .Values.alertRules.MySQLReplicationNotRunning.silence }}
            {{- end }}
          expr: {{$ioRunningMetric}}{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} == 0 or {{$sqlRunningMetric}}{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'}
            == 0
          for: {{ .Values.alertRules.MySQLReplicationNotRunning.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLReplicationNotRunning.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: MySQLReplicationLag
          annotations:
            message: "MySQL slave replication has fallen behind and is not recovering, current_value={{ `{{ $value }}` }}. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_slave_lag_seconds
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.MySQLReplicationLag.silence }}
            silence: {{ .Values.alertRules.MySQLReplicationLag.silence }}
            {{- end }}
          expr: mysql_slave_lag_seconds{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} > {{ .Values.alertRules.MySQLReplicationLag.threshold | default 30 }}
          for: {{ .Values.alertRules.MySQLReplicationLag.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLReplicationLag.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: MySQLInnoDBLogWaits
          annotations:
            message: "MySQL innodb logs are waiting for disk at a rate of {{`{{$value}}`}} second. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_global_status_innodb_log_waits
            product: harmonycloud
            service: metrics
            summary: MySQL innodb log writes stalling
            {{- if .Values.alertRules.MySQLInnoDBLogWaits.silence }}
            silence: {{ .Values.alertRules.MySQLInnoDBLogWaits.silence }}
            {{- end }}
          expr: rate(mysql_global_status_innodb_log_waits{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'}[15m]) > {{ .Values.alertRules.MySQLInnoDBLogWaits.threshold | default 10 }}
          for: {{ .Values.alertRules.MySQLInnoDBLogWaits.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLInnoDBLogWaits.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
      - name: mysql-stats
        rules:
        - alert: MySQLInstanceDown
          annotations:
            message: "MySQL Instance is down. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_up
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.MySQLInstanceDown.silence }}
            silence: {{ .Values.alertRules.MySQLInstanceDown.silence }}
            {{- end }}
          expr: mysql_up{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} == 0 or kube_pod_container_status_running{container="mysql", namespace='{{ .Globe.Namespace }}', pod=~"{{ .Globe.Name }}-[0-9]"} == 0
          for: {{ .Values.alertRules.MySQLInstanceDown.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLInstanceDown.alertLevel | default "critical" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: MySQLOpenFilesHigh
          annotations:
            message: 'MySQL Open files is high, Please consider increasing open_files_limit, current_value={{ `{{ printf "%.0f" $value }}` }}%. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})'
            metric: mysql_global_status_innodb_num_open_files
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.MySQLOpenFilesHigh.silence }}
            silence: {{ .Values.alertRules.MySQLOpenFilesHigh.silence }}
            {{- end }}
          expr: mysql_global_status_innodb_num_open_files{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} * 100 / (mysql_global_variables_open_files_limit{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'}) > {{ .Values.alertRules.MySQLOpenFilesHigh.threshold | default 75 }}
          for: {{ .Values.alertRules.MySQLOpenFilesHigh.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLOpenFilesHigh.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: MySQLReadBufferOutOfMaxAllow
          annotations:
            message: "MySQl read buffer size (read_buffer_size) is bigger than max. allowed packet size (max_allowed_packet).This can break your replication. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_global_variables_read_buffer_size
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.MySQLReadBufferOutOfMaxAllow.silence }}
            silence: {{ .Values.alertRules.MySQLReadBufferOutOfMaxAllow.silence }}
            {{- end }}
          expr: mysql_global_variables_read_buffer_size{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} > mysql_global_variables_slave_max_allowed_packet{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'}
          for: {{ .Values.alertRules.MySQLReadBufferOutOfMaxAllow.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLReadBufferOutOfMaxAllow.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: MySQLTooManyConnections
          annotations:
            alertLevel: warning
            message: 'MySQL instance used more than {{ .Values.alertRules.MySQLTooManyConnections.threshold | default 80 }}% of max connections limited, current_value={{ `{{ printf "%.0f" $value }}` }}%. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})'
            metric: mysql_global_status_max_used_connections
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.MySQLTooManyConnections.silence }}
            silence: {{ .Values.alertRules.MySQLTooManyConnections.silence }}
            {{- end }}
          expr: mysql_global_status_threads_connected{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} * 100/ mysql_global_variables_max_connections{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} > {{ .Values.alertRules.MySQLTooManyConnections.threshold | default 80 }}
          for: {{ .Values.alertRules.MySQLTooManyConnections.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLTooManyConnections.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: MySQLIOThreadStopped
          annotations:
            message: "MySQL instance IO thread has stopped. This is usually because it cannot connect to the Master any more. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: {{$ioRunningMetric}}
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.MySQLIOThreadStopped.silence }}
            silence: {{ .Values.alertRules.MySQLIOThreadStopped.silence }}
            {{- end }}
          expr: {{$ioRunningMetric}}{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} != 1
          for: {{ .Values.alertRules.MySQLIOThreadStopped.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLIOThreadStopped.alertLevel | default "critical" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: MySQLSQLThreadStopped
          annotations:
            message: "MySQL instance SQL thread has stopped. This is usually because it cannot apply a SQL statement received from the master. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: {{$sqlRunningMetric}}
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.MySQLSQLThreadStopped.silence }}
            silence: {{ .Values.alertRules.MySQLSQLThreadStopped.silence }}
            {{- end }}
          expr: {{$sqlRunningMetric}}{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} == 0
          for: {{ .Values.alertRules.MySQLSQLThreadStopped.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLSQLThreadStopped.alertLevel | default "critical" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: MySQLSQLThreadError
          annotations:
            message: "MySQL instance SQL thread has stopped. This is usually because it cannot apply a SQL statement received from the master. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: {{$sqlRunningMetric}}
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.MySQLSQLThreadError.silence }}
            silence: {{ .Values.alertRules.MySQLSQLThreadError.silence }}
            {{- end }}
          expr: {{$sqlRunningMetric}}{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} != 1
          for: {{ .Values.alertRules.MySQLSQLThreadError.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLSQLThreadError.alertLevel | default "critical" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: MySQLSlaveLaggingBehindMaster
          annotations:
            message: "MySQL instance Slave is lagging behind Master. Please check if Slave threads are running and if there are some performance issues, current_value={{ `{{ $value }}` }}. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: {{$secondsBehindMetric}}
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.MySQLSlaveLaggingBehindMaster.silence }}
            silence: {{ .Values.alertRules.MySQLSlaveLaggingBehindMaster.silence }}
            {{- end }}
          expr: {{$secondsBehindMetric}}{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} > {{ .Values.alertRules.MySQLSlaveLaggingBehindMaster.threshold | default 30 }}
          for: {{ .Values.alertRules.MySQLSlaveLaggingBehindMaster.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLSlaveLaggingBehindMaster.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: MySQLVolumeUsageMinor
          expr:  (100 * kube_persistentvolumeclaim_info{namespace='{{ .Globe.Namespace }}', persistentvolumeclaim=~"mysql-data-{{ .Globe.Name }}-[0-9]"}) * on(volumename) group_left max(label_replace ((used_size_kb / total_size_kb),"volumename", "$1", "pv", "(.+)")) by (volumename) > {{ .Values.alertRules.MySQLVolumeUsageMinor.threshold | default 70 }}
          for: {{ .Values.alertRules.MySQLVolumeUsageMinor.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLVolumeUsageMinor.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
          annotations:
            product: harmonycloud
            message: 'The disk usage of MySQL has exceeded {{ .Values.alertRules.MySQLVolumeUsageMinor.threshold | default 70 }}%, current_value={{ `{{ printf "%.0f" $value }}` }}%.  (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Persistentvolumeclaim: {{`{{ $labels.persistentvolumeclaim }}`}})'
            {{- if .Values.alertRules.MySQLVolumeUsageMinor.silence }}
            silence: {{ .Values.alertRules.MySQLVolumeUsageMinor.silence }}
            {{- end }}
    
        - alert: MySQLVolumeUsageMajor
          expr: (100 * kube_persistentvolumeclaim_info{namespace='{{ .Globe.Namespace }}', persistentvolumeclaim=~"mysql-data-{{ .Globe.Name }}-[0-9]"}) * on(volumename) group_left max(label_replace ((used_size_kb / total_size_kb),"volumename", "$1", "pv", "(.+)")) by (volumename) > {{ .Values.alertRules.MySQLVolumeUsageMajor.threshold | default 85 }}
          for: {{ .Values.alertRules.MySQLVolumeUsageMajor.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLVolumeUsageMajor.alertLevel | default "critical" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
          annotations:
            product: harmonycloud
            message: 'The disk usage of MySQL has exceeded {{ .Values.alertRules.MySQLVolumeUsageMajor.threshold | default 85 }}%, current_value={{ `{{ printf "%.0f" $value }}` }}%.  (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Persistentvolumeclaim: {{`{{ $labels.persistentvolumeclaim }}`}})'
            {{- if .Values.alertRules.MySQLVolumeUsageMajor.silence }}
            silence: {{ .Values.alertRules.MySQLVolumeUsageMajor.silence }}
            {{- end }}
    
        - alert: MySQLFailOver
          annotations:
            message: 'The MySQL instance occurs Master-slave switchover or failover. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}'
            {{- if .Values.alertRules.MySQLFailOver.silence }}
            silence: {{ .Values.alertRules.MySQLFailOver.silence }}
            {{- end }}
          expr: delta(mysql_global_variables_read_only{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]'}[5m]) > 0
          for: {{ .Values.alertRules.MySQLFailOver.interval | default "1" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLFailOver.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: MySQLWorkingSetMemoryUsageHigh
          annotations:
            message: 'The workingSet memory(include Active Pages in the File System Cache) usage of MySQL has exceeded {{ .Values.alertRules.MySQLWorkingSetMemoryUsageHigh.threshold | default 95 }}%, current_value={{ `{{ printf "%.0f" $value }}` }}%.  (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})'
            {{- if .Values.alertRules.MySQLWorkingSetMemoryUsageHigh.silence }}
            silence: {{ .Values.alertRules.MySQLWorkingSetMemoryUsageHigh.silence }}
            {{- end }}
          expr: sum(container_memory_working_set_bytes{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]',endpoint!="",container="mysql"}) by (pod) * 100 / sum(kube_pod_container_resource_requests{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]',resource="memory",container="mysql"}) by (pod) > {{ .Values.alertRules.MySQLWorkingSetMemoryUsageHigh.threshold | default 95 }}
          for: {{ .Values.alertRules.MySQLWorkingSetMemoryUsageHigh.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLWorkingSetMemoryUsageHigh.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: MySQLRSSMemoryUsageHigh
          annotations:
            message: 'The rss memory usage of MySQL has exceeded {{ .Values.alertRules.MySQLRSSMemoryUsageHigh.threshold | default 80 }}%, current_value={{ `{{ printf "%.0f" $value }}` }}%.  (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})'
            {{- if .Values.alertRules.MySQLRSSMemoryUsageHigh.silence }}
            silence: {{ .Values.alertRules.MySQLRSSMemoryUsageHigh.silence }}
            {{- end }}
          expr: sum(container_memory_rss{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]',endpoint!="",container="mysql"}) by (pod) * 100 / sum(kube_pod_container_resource_requests{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]',resource="memory",container="mysql"}) by (pod) > {{ .Values.alertRules.MySQLRSSMemoryUsageHigh.threshold | default 80 }}
          for: {{ .Values.alertRules.MySQLRSSMemoryUsageHigh.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLRSSMemoryUsageHigh.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}    
        - alert: MySQLCpuUsageHigh
          annotations:
            message: 'The cpu usage of MySQL has exceeded {{ .Values.alertRules.MySQLCpuUsageHigh.threshold | default 90 }}%, current_value={{ `{{ printf "%.0f" $value }}` }}%.  (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})'
            {{- if .Values.alertRules.MySQLCpuUsageHigh.silence }}
            silence: {{ .Values.alertRules.MySQLCpuUsageHigh.silence }}
            {{- end }}
          expr: sum(rate (container_cpu_usage_seconds_total{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]',endpoint!="",container="mysql"}[5m]) ) by (pod) * 100 / sum(kube_pod_container_resource_requests{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]',resource="cpu",container="mysql"}) by (pod)  > {{ .Values.alertRules.MySQLCpuUsageHigh.threshold | default 90 }}
          for: {{ .Values.alertRules.MySQLCpuUsageHigh.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.MySQLCpuUsageHigh.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}    
    
    
      {{- if .Values.proxy.enable }}
      - name: proxysql
        rules:
        - alert: ProxySqlInstanceDown
          annotations:
            message: "MySQL ProxySQL is down. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: up
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.ProxySqlInstanceDown.silence }}
            silence: {{ .Values.alertRules.ProxySqlInstanceDown.silence }}
            {{- end }}
          expr: up{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'}== 0 or kube_pod_container_status_running{container="proxysql", pod=~"{{ .Globe.Name }}-proxy.*"} == 0
          for: {{ .Values.alertRules.ProxySqlInstanceDown.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.ProxySqlInstanceDown.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
        - alert: ProxySqlConnectCheckErr
          annotations:
            message: "MySQL ProxySQL connect check err. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: up
            product: harmonycloud
            service: metrics
            {{- if .Values.alertRules.ProxySqlConnectCheckErr.silence }}
            silence: {{ .Values.alertRules.ProxySqlConnectCheckErr.silence }}
            {{- end }}
          expr: irate(proxysql_mysql_monitor_connect_check_total{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}', status="err"}[5m]) > 0
          for: {{ .Values.alertRules.ProxySqlConnectCheckErr.interval | default "5" }}m
          labels:
            severity: {{ .Values.alertRules.ProxySqlConnectCheckErr.alertLevel | default "warning" }}
            middleware: mysql
            namespace: {{ .Globe.Namespace }}
            service: {{ .Globe.Name }}
            {{- if .Values.clusterId }}
            clusterId: {{ .Values.clusterId }}
            {{- end }}
            {{- with .Values.labels }}
            {{- toYaml . | nindent 8 }}
