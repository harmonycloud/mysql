apiVersion: middleware.cn/v1
kind: MiddlewareConfiguration
metadata:
  name: mysql-operator-configmap
spec:
  template: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: {{ .Globe.Name }}-mysql-operator-resource
      labels:
        app.kubernetes.io/name: {{ .Globe.Name }}-mysql-operator
        app.kubernetes.io/instance: {{ .Globe.Name }}
    {{`data:
      _helpers.tpl: |
        {{/* vim: set filetype=mustache: */}}
        {{/*
        Expand the name of the chart.
        */}}
        {{- define "proxysql.name" -}}
        {{- default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" -}}
        {{- end -}}
      
        {{/*
        Create a default fully qualified app name.
        We truncate at 63 chars because some Kubernetes name fields are limited to this (by the DNS naming spec).
        If release name contains chart name it will be used as a full name.
        */}}
        {{- define "proxysql.fullname" -}}
        {{- if .Values.fullnameOverride -}}
        {{- .Values.fullnameOverride | trunc 63 | trimSuffix "-" -}}
        {{- else -}}
        {{- $name := default .Chart.Name .Values.nameOverride -}}
        {{- if contains $name .Release.Name -}}
        {{- .Release.Name | trunc 63 | trimSuffix "-" -}}
        {{- else -}}
        {{- printf "%s-%s" .Release.Name $name | trunc 63 | trimSuffix "-" -}}
        {{- end -}}
        {{- end -}}
        {{- end -}}
      
        {{/*
        Create chart name and version as used by the chart label.
        */}}
        {{- define "proxysql.chart" -}}
        {{- printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" -}}
        {{- end -}}
      
        {{/*
        Common labels
        */}}
        {{- define "proxysql.labels" -}}
        app.kubernetes.io/name: {{ include "proxysql.name" . }}
        helm.sh/chart: {{ include "proxysql.chart" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- if .Chart.AppVersion }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        {{- end }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        {{- end -}}
      NOTES.txt: |
        1. Get the application URL by running these commands:
        {{- if .Values.ingress.enabled }}
        {{- range $host := .Values.ingress.hosts }}
          {{- range .paths }}
          http{{ if $.Values.ingress.tls }}s{{ end }}://{{ $host.host }}{{ . }}
          {{- end }}
        {{- end }}
        {{- else if contains "NodePort" .Values.service.type }}
          export NODE_PORT=$(kubectl get --namespace {{ .Release.Namespace }} -o jsonpath="{.spec.ports[0].nodePort}" services {{ include "proxysql.fullname" . }})
          export NODE_IP=$(kubectl get nodes --namespace {{ .Release.Namespace }} -o jsonpath="{.items[0].status.addresses[0].address}")
          echo http://$NODE_IP:$NODE_PORT
        {{- else if contains "LoadBalancer" .Values.service.type }}
             NOTE: It may take a few minutes for the LoadBalancer IP to be available.
                   You can watch the status of by running 'kubectl get --namespace {{ .Release.Namespace }} svc -w {{ include "proxysql.fullname" . }}'
          export SERVICE_IP=$(kubectl get svc --namespace {{ .Release.Namespace }} {{ include "proxysql.fullname" . }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo http://$SERVICE_IP:{{ .Values.service.port }}
        {{- else if contains "ClusterIP" .Values.service.type }}
          export POD_NAME=$(kubectl get pods --namespace {{ .Release.Namespace }} -l "app.kubernetes.io/name={{ include "proxysql.name" . }},app.kubernetes.io/instance={{ .Release.Name }}" -o jsonpath="{.items[0].metadata.name}")
          echo "Visit http://127.0.0.1:8080 to use your application"
          kubectl port-forward $POD_NAME 8080:80
        {{- end }}
      configmap.yaml: |
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: {{ .Release.Name }}-shell
        data:
          sync-user.sh: |
              #!/bin/bash
              set -x
              source /tmp/envdump.sh
              ./proxysql-admin --proxysql-username=$ADMIN_USER --proxysql-password=$ADMIN_PASSWORD --proxysql-port=6032 --server=$MYSQL_HOST:$MYSQL_PORT --cluster-username=$MYSQL_USER --cluster-password=$MYSQL_PASSWORD --writer-hg=1 --debug --syncusers
          proxysql-connect.sh: |
              #!/bin/bash
              mysql -u $ADMIN_USER -p$ADMIN_PASSWORD -h 127.0.0.1  -P6032 --prompt 'ProxySQL Admin> '
      deployment.yaml: |-
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: {{ include "proxysql.fullname" . }}
          annotations:
        {{- toYaml .Values.annotations | nindent 4 }}
          labels:
        {{ include "proxysql.labels" . | indent 4 }}
        spec:
          replicas: {{ .Values.replicaCount }}
          {{- with .Values.strategy }}
          strategy:
            {{- toYaml . | nindent 4 }}
          {{- end }}
          selector:
            matchLabels:
              app.kubernetes.io/name: {{ include "proxysql.name" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: {{ include "proxysql.name" . }}
                app.kubernetes.io/instance: {{ .Release.Name }}
              annotations:
            {{- toYaml .Values.annotations | nindent 8 }}
            spec:
            {{- with .Values.securityContext}}
              securityContext:
                {{- toYaml . | nindent 8 }}
            {{- end }}
            {{- with .Values.imagePullSecrets }}
              imagePullSecrets:
                {{- toYaml . | nindent 8 }}
            {{- end }}
              initContainers:
              - name: check-mysql
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
                imagePullPolicy: {{ .Values.image.pullPolicy }}
                command: [ 'sh', '-c', " while true;do sleep 5; mysql -h $(MYSQL_HOST) -P $(MYSQL_PORT) -u $(MYSQL_USER) -p$(MYSQL_PASSWORD)  -e \"select 1\"; if [ $? -eq 0 ]; then echo \"mysql check ok\" && exit 0; fi;done" ]
                env:
                  - name: MYSQL_HOST
                    value: "{{ .Values.mysql.mysqlName }}"
                  - name: MYSQL_PORT
                    value: "{{  .Values.mysql.mysqlPort }}"
                  - name: MYSQL_USER
                    value: "{{ .Values.mysql.user }}"
                  - name: MYSQL_PASSWORD
                    value: "{{ .Values.mysql.password }}"
                  - name: TZ
                    value: "Asia/Shanghai"
                resources:
                  requests:
                    memory: "50Mi"
                    cpu: "50m"
                  limits:
                    memory: "100Mi"
                    cpu: "100m"
              containers:
                - name: {{ .Chart.Name }}
                  image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
                  imagePullPolicy: {{ .Values.image.pullPolicy }}
                  lifecycle:
                    postStart:
                      exec:
                        command: [ "/bin/sh", "-c", "sleep 5 &&/tmp/proxysql/sync-user.sh" ]
                  ports:
                    - name: proxysql
                      containerPort: 6033
                      protocol: TCP
                    - name: admin
                      containerPort: 6032
                      protocol: TCP
                  env:
                    - name: MYSQL_HOST
                      value: "{{ .Values.mysql.mysqlName }}"
                    - name: MYSQL_PORT
                      value: "{{  .Values.mysql.mysqlPort }}"
                    - name: MYSQL_USER
                      value: "{{ .Values.mysql.user }}"
                    - name: MYSQL_PASSWORD
                      value: "{{ .Values.mysql.password }}"
                    - name: ADMIN_USER
                      value: "{{ .Values.adminUser }}"
                    - name: ADMIN_PASSWORD
                      value: "{{ .Values.adminPassword }}"
                    - name: TZ
                      value: "Asia/Shanghai"
                  volumeMounts:
                    - name: {{ .Release.Name }}-config
                      mountPath: /etc/proxysql
                    - name: {{ .Release.Name }}-shell
                      mountPath: /tmp/proxysql
                    - mountPath: /var/lib/proxysql
                      name: cache-volume
                  livenessProbe:
                    tcpSocket:
                      port: 6032
                  readinessProbe:
                    tcpSocket:
                      port: 6032
                  resources:
                    {{- toYaml .Values.resources | nindent 12 }}
            {{- with .Values.nodeSelector }}
              nodeSelector:
                {{- toYaml . | nindent 8 }}
            {{- end }}
            {{- with .Values.affinity }}
              affinity:
                {{- toYaml . | nindent 8 }}
            {{- end }}
            {{- with .Values.tolerations }}
              tolerations:
                {{- toYaml . | nindent 8 }}
            {{- end }}
            {{- with .Values.topologySpreadConstraints }}
              topologySpreadConstraints:
                {{- toYaml . | nindent 8 }}
            {{- end }}
              volumes:
                - name: {{ .Release.Name }}-config
                  configMap:
                    name: {{ .Release.Name }}-cm
                - name: {{ .Release.Name }}-shell
                  configMap:
                    defaultMode: 493
                    name: {{ .Release.Name }}-shell
                - name: cache-volume
                  emptyDir: {}
      ingress.yaml: |
        {{- if .Values.ingress.enabled -}}
        {{- $fullName := include "proxysql.fullname" . -}}
        apiVersion: extensions/v1beta1
        kind: Ingress
        metadata:
          name: {{ $fullName }}
          labels:
        {{ include "proxysql.labels" . | indent 4 }}
          {{- with .Values.ingress.annotations }}
          annotations:
            {{- toYaml . | nindent 4 }}
          {{- end }}
        spec:
        {{- if .Values.ingress.tls }}
          tls:
          {{- range .Values.ingress.tls }}
            - hosts:
              {{- range .hosts }}
                - {{ . | quote }}
              {{- end }}
              secretName: {{ .secretName }}
          {{- end }}
        {{- end }}
          rules:
          {{- range .Values.ingress.hosts }}
            - host: {{ .host | quote }}
              http:
                paths:
                {{- range .paths }}
                  - path: {{ . }}
                    backend:
                      serviceName: {{ $fullName }}
                      servicePort: 6070
                {{- end }}
          {{- end }}
        {{- end }}
      service.yaml: |
        apiVersion: v1
        kind: Service
        metadata:
          name: {{ include "proxysql.fullname" . }}
          labels:
        {{ include "proxysql.labels" . | indent 4 }}
        spec:
          type: {{ .Values.service.type }}
          ports:
            - port: {{ .Values.service.port }}
              targetPort: 6033
              protocol: TCP
              name: proxysql
            - port: 6070
              targetPort: 6070
              protocol: TCP
              name: metrics
          selector:
            app.kubernetes.io/name: {{ include "proxysql.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}`}}