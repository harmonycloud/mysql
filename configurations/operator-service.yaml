apiVersion: middleware.cn/v1
kind: MiddlewareConfiguration
metadata:
  name: mysql-operator-service
spec:
  template: |
    apiVersion: v1
    kind: Service
    metadata:
      name: {{ .Globe.Name }}
    spec:
      selector:
        app.kubernetes.io/name: mysql-operator
        app.kubernetes.io/instance: "{{ .Globe.Name }}"
      ports:
        - protocol: TCP
          port: 8080
          targetPort: 8080