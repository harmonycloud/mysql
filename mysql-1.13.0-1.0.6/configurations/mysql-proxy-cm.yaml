apiVersion: middleware.cn/v1
kind: MiddlewareConfiguration
metadata:
  name: mysql-proxy-cm
spec:
  template: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: {{ .Globe.Name }}-proxy-cm
      labels:
        app.kubernetes.io/name: mysql
        app.kubernetes.io/instance: {{ .Globe.Name }}
    data:
      proxysql.cnf: |
        datadir="/var/lib/proxysql"
      
        admin_variables=
        {
          admin_credentials="proxy_harmonycloud:Ab123456"
          mysql_ifaces="0.0.0.0:6032"
          restapi_enabled=true
          restapi_port=6070
          prometheus_memory_metrics_interval=60
        }
      
        mysql_variables=
        {
      
          monitor_username="root"
          monitor_password="Hc@Cloud01"
      
          # value.yaml中int会转化float64，转为科学计数法，导致配置错误，需要强制将float64转为int类型
          auto_increment_delay_multiplex=0
          commands_stats="true"
          connect_retries_on_failure=10
          connect_timeout_server=3000
          default_query_delay=0
          default_query_timeout=36000000
          default_schema="information_schema"
          have_compress="true"
          interfaces="0.0.0.0:6033"
          max_allowed_packet=4194304
          max_connections=2048
          monitor_connect_interval=5000
          monitor_history=600000
          monitor_ping_interval=2000
          monitor_read_only_interval=1500
          monitor_read_only_timeout=500
          monitor_slave_lag_when_null=0
          ping_interval_server_msec=15000
          ping_timeout_server=500
          poll_timeout=2000
          server_version="8.0.30"
          sessions_sort="true"
          stacksize=1048576
          threads=2
        }
      
        
      
        # defines all the MySQL servers
        mysql_servers =
        (
        
        
          { address="mysqlxxxxx-0.mysqlxxxxx-headless" , port=3306 , hostgroup=1, max_connections=5000, max_replication_lag=20},
        
          { address="mysqlxxxxx-1.mysqlxxxxx-headless" , port=3306 , hostgroup=1, max_connections=5000, max_replication_lag=20},
        
        )
      
      
        # defines all the MySQL users
        mysql_users:
        (
          { username = "root" , password = "Hc@Cloud01"},
        )
      
        #defines MySQL Query Rules
      
        mysql_query_rules:
          (
          {
            rule_id=1
            active=1
            match_pattern="^SELECT .* FOR UPDATE$"
            destination_hostgroup=0
            apply=1
          },
          {
            rule_id=2
            active=1
            match_pattern="^SELECT"
            destination_hostgroup=1
            apply=1
          },
          {
            rule_id=3
            active=1
            match_pattern="SELECT  @@"
            destination_hostgroup=1
            apply=1
          },
          {
            rule_id=4
            active=1
            match_pattern="show databases"
            destination_hostgroup=1
            apply=1
          },
        )
        
      
      
        scheduler=
        (
          {
            id=1
            active=1
            interval_ms=600000
            filename="/tmp/proxysql/sync-user.sh"
            comment="sync-user"
          }
        )
      
      
        mysql_replication_hostgroups=
        (
          {
            writer_hostgroup=0
            reader_hostgroup=1
            comment="RHG1"
          }
        )
