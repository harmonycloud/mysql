  # audit_whitelist_cmds: "select"

additionArgs: {}

  #max_connections: 600
  #innodb_buffer_pool_size: 1G
  #slave_parallel_workers: 8

# version: "5.7" 版本号为5.7.35
# version: "5.7.35" 版本号为5.7.35
# version: "5.7.39" 版本号为5.7.39
# version: "8.0" 版本号为8.0.26
# version: "8.0.26" 版本号为8.0.26
# version: "8.0.31" 版本号为8.0.31
version: "5.7"
# master-slave or slave-slave
type: master-slave
# semi-sync or group-replication
syncMode: semi-sync
ssh:
  enabled: false

storageSize: 10Gi
#storageClassName: default

service: {}
#  nodePort: 30066
#  readOnlyNodePort: 30067

businessDeploy: []
# - database: db01
# pwd: "yourpassword"
# user: user01

init_at_setup:
  enabled: false
  #init_sql: |-
  #  create database business_ability;

replicaCount: 2

image:
  repository: harbor.middleware.com/middleware
  middlewareImageTag_5_7_35: v5.7.35-hc.5
  middlewareImageTag_5_7_39: v5.7.39-hc.2
  middlewareImageTag_5_7_44: v5.7.44-hc.1
  middlewareImageTag_8_0_26: v8.0.26-hc.7
  middlewareImageTag_8_0_31: v8.0.31-hc.1
  middlewareImageTag_8_0_39: v8.0.39-hc.1
  initImageTag: v57-2.0.0
  initImageTag_8: v80-2.0.0
  monitorImageTag: v0.12.1-1.0.0
  backupRestoreImageTag: v1.2.0-hc.8
  backupRestoreImageTag_8: v8.0-4
  helmtestImageTag: v1.0.0
  pullPolicy: IfNotPresent
  testImageTag: v0.3
  logrotateImageTag: 3.21.0-1.0.0
  proxyImageTag: 2.5.2-1.0.0

nameOverride: ""
fullnameOverride: ""

resources:
  limits:
    cpu: "1"
    memory: 2Gi
  requests:
    cpu: "1"
    memory: 2Gi

storageProvider: {}
#  minio:
#    endpoint: http://10.1.10.63:30894
#    bucketName: mybucket
#    backupFileName: mysql-example-2020-11-10-150727.gz
#    accessKeyId: minio
#    secretAccessKey: Hc@Cloud01

nodeAffinity: {}

updateStrategy: RollingUpdate

# 支持扩展Spec
statefulSetConfiguration:
  securityContext:
    fsGroup: 0

  # tolerations:
  # - key: "example-key1"
  #   operator: "Exists"
  #   effect: "NoSchedule"

tolerations: {}
#- key: "example-key"
#  operator: "Exists"
#  effect: "NoSchedule"

podAntiAffinityTopologKey: "kubernetes.io/hostname"

#取值[hard|soft] hard:强制反亲和 soft:非强制反亲和
podAntiAffinity: "soft"

replication:
  enabled: false

recycle:
  enabled: true

annotations: {}

labels: {}
proxy:
  enable: false
  podAntiAffinity: "soft"
  replicaCount: 1
  securityContext:
    fsGroup: 0
  resources:
    limits:
      cpu: 1000m
      memory: 2048Mi
    requests:
      cpu: 500m
      memory: 1024Mi
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  args:
    # MySQL Variables
    mysql-max_connections: 2048
    mysql-max_allowed_packet: 4194304
    mysql-threads: 2
    mysql-default_query_delay: 0
    mysql-default_query_timeout: 36000000
    mysql-have_compress: true
    mysql-poll_timeout: 2000
    mysql-interfaces: "0.0.0.0:6033"
    mysql-default_schema: "information_schema"
    mysql-stacksize: 1048576
    mysql-server_version: "8.0.30"
    mysql-connect_timeout_server: 3000
    mysql-ping_interval_server_msec: 15000
    mysql-ping_timeout_server: 500
    mysql-commands_stats: true
    mysql-sessions_sort: true
    mysql-connect_retries_on_failure: 10
    mysql-auto_increment_delay_multiplex: 0

    # MySQL Monitor Variables
    mysql-monitor_history: 600000
    mysql-monitor_connect_interval: 5000
    mysql-monitor_ping_interval: 2000
    mysql-monitor_read_only_interval: 1500
    mysql-monitor_read_only_timeout: 500
    mysql-monitor_slave_lag_when_null: 0

    # other arges
    sync_user_period: 600000
    mysql_query_rules: |
      (
        {
          rule_id=1
          active=1
          match_pattern="^SELECT .* FOR UPDATE$"
          destination_hostgroup=0
          apply=1
        },
        {
          rule_id=2
          active=1
          match_pattern="^SELECT"
          destination_hostgroup=1
          apply=1
        },
        {
          rule_id=3
          active=1
          match_pattern="SELECT  @@"
          destination_hostgroup=1
          apply=1
        },
        {
          rule_id=4
          active=1
          match_pattern="show databases"
          destination_hostgroup=1
          apply=1
        },
      )

features:
  threadpool:
    enabled: false
  recycle:
    enabled: false
  bufferpoolControl:
    enabled: false
  auditLog:
    enabled: false
