apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "proxysql.fullname" . }}
  labels:
{{ include "proxysql.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "proxysql.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "proxysql.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
    {{- with .Values.securityContext}}
      securityContext:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      initContainers:
      - name: check-mysql
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: [ 'sh', '-c', " while true;do sleep 5; mysql -h $(MYSQL_HOST) -P $(MYSQL_PORT) -u $(MYSQL_USER) -p$(MYSQL_PASSWORD)  -e \"select 1\"; if [ $? -eq 0 ]; then echo \"mysql check ok\" && exit 0; fi;done" ]
        env:
          - name: MYSQL_HOST
            value: "{{ .Values.mysql.mysqlName }}"
          - name: MYSQL_PORT
            value: "{{  .Values.mysql.mysqlPort }}"
          - name: MYSQL_USER
            value: "{{ .Values.mysql.user }}"
          - name: MYSQL_PASSWORD
            value: "{{ .Values.mysql.password }}"
          - name: TZ
            value: "Asia/Shanghai"
        resources:
          requests:
            memory: "50Mi"
            cpu: "50m"
          limits:
            memory: "100Mi"
            cpu: "100m"
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          lifecycle:
            postStart:
              exec:
                command: [ "/bin/sh", "-c", "sleep 5 &&/tmp/proxysql/sync-user.sh" ]
          ports:
            - name: proxysql
              containerPort: 6033
              protocol: TCP
            - name: admin
              containerPort: 6032
              protocol: TCP
          env:
            - name: MYSQL_HOST
              value: "{{ .Values.mysql.mysqlName }}"
            - name: MYSQL_PORT
              value: "{{  .Values.mysql.mysqlPort }}"
            - name: MYSQL_USER
              value: "{{ .Values.mysql.user }}"
            - name: MYSQL_PASSWORD
              value: "{{ .Values.mysql.password }}"
            - name: ADMIN_USER
              value: "{{ .Values.adminUser }}"
            - name: ADMIN_PASSWORD
              value: "{{ .Values.adminPassword }}"
            - name: TZ
              value: "Asia/Shanghai"
          volumeMounts:
            - name: {{ .Release.Name }}-config
              mountPath: /etc/proxysql
            - name: {{ .Release.Name }}-shell
              mountPath: /tmp/proxysql
            - mountPath: /var/lib/proxysql
              name: cache-volume
          livenessProbe:
            tcpSocket:
              port: 6032
          readinessProbe:
            tcpSocket:
              port: 6032
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
    {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      volumes:
        - name: {{ .Release.Name }}-config
          configMap:
            name: {{ .Release.Name }}-cm
        - name: {{ .Release.Name }}-shell
          configMap:
            defaultMode: 493
            name: {{ .Release.Name }}-shell
        - name: cache-volume
          emptyDir: {}