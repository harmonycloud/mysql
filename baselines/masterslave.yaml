apiVersion: middleware.cn/v1
kind: MiddlewareBaseline
metadata:
  name: mysql-master-slave
  annotations:
    baselineName: "Master-Slave mode"
    description: "Master-Slave Mode Baseline, incorporating core functionality and essential dependencies, is tailored for rapid deployment and fundamental application scenarios. It delivers stable and reliable performance, and is designed for ease of extension and maintenance."
    mode: "HA"
spec:
  operatorBaseline:
    name: mysql-operator-standard
    gvkName: v1alpha1
  necessary:
    repository: ""
    resource:
      mysql:
        limits:
          cpu: '{"type":"string","label":"CPU","required":true,"description":"Please enter a custom quota, the unit is `Core`","placeholder":"Please enter a custom quota, the unit is `Core`","default":"2","pattern":"^(?!0$)(?!0\\d)\\d+(\\.\\d)?$","min":0.1}'
          memory: '{"type":"string","label":"Memory","required":true,"description":"Please enter a custom quota, the unit is `Gi`","placeholder":"Please enter a custom quota, the unit is `Gi`","default":"4","pattern":"^(?!0$)(?!0\\d)\\d+(\\.\\d)?$","min":0.1}'
        requests:
          cpu: '{"type":"string","label":"CPU","required":true,"description":"Please enter a custom quota, the unit is `Core`","placeholder":"Please enter a custom quota, the unit is `Core`","default":"2","pattern":"^(?!0$)(?!0\\d)\\d+(\\.\\d)?$","min":0.1}'
          memory: '{"type":"string","label":"Memory","required":true,"description":"Please enter a custom quota, the unit is `Gi`","placeholder":"Please enter a custom quota, the unit is `Gi`","default":"4","pattern":"^(?!0$)(?!0\\d)\\d+(\\.\\d)?$","min":0.1}'
        replicas: '{"type":"int","label":"Replicas","required":true,"description":"Number of nodes in the MySQL cluster, with a range of 2 to 5 nodes","default":2,"pattern":"^[2-5]$","placeholder":"Please enter the number of instances  "}'
        volume:
          size: '{"type":"int","label":"StorageSize","required":true,"pattern":"^(?!0\\d)(?:[5-9]|[1-9]\\d+)(\\.\\d+)?$|^5(\\.0+)?$","placeholder":"Please enter the storage size","min":5}'
          storageClass: '{"type":"storageClass","label":"StorageClass","required":true,"description":"Please select storage","placeholder":"Please select storage"}'
#    password: |
#      {
#        "type": "password",
#        "label": "AdminPassword",
#        "required": true,
#        "description": "Please enter a password consisting of English letters, numbers, or the special characters \"/ ~ % _ . ^ + = - [ ] : ,\"",
#        "placeholder": "Enter your admin password",
#        "pattern": "^[A-Za-z0-9~_./%^+=:\\-\\[\\],]*$"
#       }
    password: |
      {
        "type": "password",
        "label": "AdminPassword",
        "required": true,
        "patterns": [
          {
            "pattern": "^.{8,32}$",
            "description": "Password length must be between 8 and 32 characters"
          },
          {
            "pattern": "^[A-Za-z0-9~_./%^+=:\\-\\[\\],]+$",
            "description": "Please enter a password consisting of English letters, numbers, or the special characters \"/ ~ % _ . ^ + = - [ ] : ,\""
          }
        ],
        "pattern": "^[A-Za-z0-9~_./%^+=:\\-\\[\\],]*$",
        "description": "Please enter a password consisting of English letters, numbers, or the special characters \"/ ~ % _ . ^ + = - [ ] : ,\"",
        "placeholder": "Enter your admin password"
      }
    version: '{"type":"version","label":"Version","required":true,"default":"8.4.3"}'
    #collationServer: '{"type":"enum","label":"Collation Server","options":"utf8mb4_general_ci,utf8mb4_bin,utf8mb4_unicode_520_ci,utf8mb4_unicode_ci","required":true,"description":"Please enter the collation server","placeholder":"Please enter the collation server","default":"utf8mb4_general_ci"}'
    collationServer: |
      {
        "type": "enum",
        "label": "Collation Server",
        "required": true,
        "description": "Please select the collation server",
        "placeholder": "Please select the collation server",
        "default": "utf8mb4_general_ci",
        "options": ["utf8mb4_general_ci", "utf8mb4_bin", "utf8mb4_unicode_520_ci", "utf8mb4_unicode_ci"],
        "dependencies": [
          {
            "field": "version",
            "fieldRule": "regex",
            "fieldValue": "^5\\.",
            "override": {
              "options": ["utf8mb4_general_ci", "utf8mb4_bin", "utf8mb4_unicode_520_ci", "utf8mb4_unicode_ci"],
              "default": "utf8mb4_general_ci"
            }
          },
          {
            "field": "version",
            "fieldRule": "regex",
            "fieldValue": "^8\\.",
            "override": {
              "options": [
                "utf8mb4_0900_ai_ci",
                "utf8mb4_0900_as_ci", 
                "utf8mb4_0900_as_cs",
                "utf8mb4_0900_bin",
                "utf8mb4_bin",
                "utf8mb4_general_ci",
                "utf8mb4_unicode_520_ci",
                "utf8mb4_unicode_ci"
              ],
              "default": "utf8mb4_0900_ai_ci"
            }
          }
        ]
      }
    characterSet: '{"type":"enum","label":"Character Set","options":"utf8mb4","required":true,"description":"Please enter the character set","placeholder":"Please enter the character set","default":"utf8mb4"}'
  preActions:
    - name: pre-mysql-bigversion
      parameters:
        version: '"{{ .Necessary.version }}"'
        repository: "{{ .Necessary.repository }}"
      fixed: false
      exposed: false
    - name: pre-mysql-alertrule-labels
      parameters:
        labels: {}
      exposed: false
    - name: pre-mysql-logging
      parameters:
        fileLogging: true
        stdoutLogging: true
        auditLogging: false
        slowqueryLogging: true
      exposed: true
    - name: pre-mysql-affinity
      parameters:
        podAntiAffinityTopologKey: "kubernetes.io/hostname"
        podAntiAffinity: "soft"
        nodeAffinity: { }
      exposed: true
    - name: pre-mysql-tolerations
      parameters:
        tolerations: [ ]
      fixed: false
      exposed: true
  parameters:
    _statefulset:
      spec:
        template:
          spec:
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: "kubernetes.io/hostname"
                whenUnsatisfiable: ScheduleAnyway
                labelSelector:
                  matchLabels:
                    app: "{{ .Globe.Name }}"
            securityContext:
              fsGroup: 0
    clusterSwitch:
      switched: false
    cmName: "{{ .Globe.Name }}-config"
    businessDeploy:
      [ ]
    deployStrategy:
      basicConfig: { }
      migration: { }
      type: AutoDeploy
    migratePolicy: { }
    replicas: "{{ .Necessary.resource.mysql.replicas }}"
    repository: "{{ .Necessary.repository }}/mysql-cluster"
    secretName: mysql-secret
    statefulset:
      configmap: "{{ .Globe.Name }}-config"
      env:
        - name: DBNAME
          value: "{{ .Globe.Name }}"
        - name: MYSQL_ROOT_PASSWORD
          value: '"{{ .Necessary.password }}"'
        - name: MYSQL_USER_HOST
          value: "%"
        - name: MYSQL_ROOT_HOST
          value: "%"
      initImage: '{{ .Necessary.repository }}/mysql-init:{{ if eq .Necessary.version "8.0" }}v80-2.0.0{{ else if eq .Necessary.version "8.0.26" }}v80-2.0.0{{ else if eq .Necessary.version "8.0.31" }}v80-2.0.0{{ else if eq .Necessary.version "8.0.39" }}v80-2.0.0{{ else if eq .Necessary.version "8.0.40" }}v80-2.0.0{{ else if eq .Necessary.version "8.0.44" }}v80-2.0.0{{ else if eq .Necessary.version "8.0.45" }}v80-2.0.0{{ else if or (eq .Necessary.version "8.4.3") (eq .Necessary.version "8.4") }}v80-2.0.0{{ else if eq .Necessary.version "5.7.39" }}v57-2.0.0{{ else if eq .Necessary.version "5.7.44" }}v57-2.0.0{{ else }}v57-2.0.0{{ end }}'
      middlewareImage: '{{ .Necessary.repository }}/mysql-cluster:{{ if eq .Necessary.version "8.0" }}v8.0.26-hc.7{{ else if eq .Necessary.version "8.0.26" }}v8.0.26-hc.7{{ else if eq .Necessary.version "8.0.31" }}v8.0.31-hc.1{{ else if eq .Necessary.version "8.0.39" }}v8.0.39-hc.2{{ else if eq .Necessary.version "8.0.40" }}v8.0.40-hc.1{{ else if eq .Necessary.version "8.0.44" }}v8.0.44-hc.1{{ else if eq .Necessary.version "8.0.45" }}v8.0.45-1.0.0{{ else if or (eq .Necessary.version "8.4.3") (eq .Necessary.version "8.4") }}v8.4.3-1.0.0-mysql{{ else if eq .Necessary.version "5.7.39" }}v5.7.39-hc.2{{ else if eq .Necessary.version "5.7.44" }}v5.7.44-hc.2{{ else }}v8.4.3-1.0.0-mysql{{ end }}'
      backupRestoreImage: '{{ .Necessary.repository }}/mysql-xtrabackup:{{ if eq .Necessary.version "8.0" }}v8.0-4{{ else if eq .Necessary.version "8.0.26" }}v8.0-4{{ else if eq .Necessary.version "8.0.31" }}v8.0-4{{ else if eq .Necessary.version "8.0.39" }}v8.0-4{{ else if eq .Necessary.version "8.0.40" }}v8.0-4{{ else if eq .Necessary.version "8.0.44" }}v8.0-4{{ else if eq .Necessary.version "8.0.45" }}v8.0-4{{ else if or (eq .Necessary.version "8.4.3") (eq .Necessary.version "8.4") }}v8.0-4{{ else if eq .Necessary.version "5.7.39" }}v1.2.0-hc.8{{ else if eq .Necessary.version "5.7.44" }}v1.2.0-hc.8{{ else }}v8.0-4{{ end }}'
      monitorImage: "{{ .Necessary.repository }}/mysqld-exporter:v0.12.1-1.0.0"
      logrotateImage: "{{ .Necessary.repository }}/logrotate:3.21.0-1.0.0"
      imagePullPolicy: IfNotPresent
      serverPort: 3306
      nodePort:
      readOnlyNodePort:
      hostNetwork: false
      annotations:
        fixed-node-middleware-pod: "true"
        fixed.ipam.harmonycloud.cn: "true"
      labels:
        app: "{{ .Globe.Name }}"
        operatorname: mysql-operator
      resources:
        limits:
          cpu: '"{{ .Necessary.resource.mysql.limits.cpu }}"'
          memory: '"{{ .Necessary.resource.mysql.limits.memory }}"'
        requests:
          cpu: '"{{ .Necessary.resource.mysql.requests.cpu }}"'
          memory: '"{{ .Necessary.resource.mysql.requests.memory }}"'
      updateStrategy:
        type: RollingUpdate
    type: master-slave
    syncMode: semi-sync
    version: "{{ .Necessary.version }}"
    volumeClaimTemplates:
      - metadata:
          name: mysql-data
        spec:
          accessModes: [ "ReadWriteOnce" ]
          storageClassName: "{{ .Necessary.resource.mysql.volume.storageClass }}"
          resources:
            requests:
              storage: "{{ .Necessary.resource.mysql.volume.size }}"
  configurations:
    - name: mysql-alertrule
      values:
        version: "{{ .Necessary.version }}"
        alertRules:
          MySQLExporterDown: { }
          MySQLReplicationNotRunning: { }
          MySQLReplicationLag: { }
          MySQLInnoDBLogWaits: { }
          MySQLInstanceDown: { }
          MySQLOpenFilesHigh: { }
          MySQLReadBufferOutOfMaxAllow: { }
          MySQLTooManyConnections: { }
          MySQLIOThreadStopped: { }
          MySQLSQLThreadStopped: { }
          MySQLSQLThreadError: { }
          MySQLSlaveLaggingBehindMaster: { }
          MySQLVolumeUsageMinor: { }
          MySQLVolumeUsageMajor: { }
          MySQLFailOver: { }
          MySQLWorkingSetMemoryUsageHigh: { }
          MySQLRSSMemoryUsageHigh: { }
          MySQLCpuUsageHigh: { }
          ProxySqlInstanceDown: { }
          ProxySqlConnectCheckErr: { }
          ProxySqlPinCheckErr: { }
          ProxySqlReadOnlyCheckErr: { }
          ProxySqlReplicationLagCheckErr: { }
        #customAlertRules:
        #  MyCustomMySQLAlert:
        #    alertLevel: warning
        #    threshold: 80
        #    silence: 60
        #    interval: 5
        #    alertText: "Custom MySQL alert rule text"
        #    alertExpr: |
        #      sum(rate(mysql_global_status_commands_total[5m])) by (instance) > 1000

        proxy:
          enable: false
    - name: mysql-connection-credential
      values:
        args:
          server_port: "{{ .Parameters.statefulset.serverPort }}"
          root_password: "{{ .Necessary.password }}"
    - name: mysql-exporter
      values: { }
    - name: mysql-initsql-cm
      values:
        init_at_setup:
          enabled: false
          init_sql: ""
    - name: mysql-proxy-cm
      values:
        replicaCount: "{{ .Necessary.resource.mysql.replicas }}"
        args:
          root_password: "{{ .Necessary.password }}"
          server_port: "{{ .Parameters.statefulset.serverPort }}"
        proxy:
          user:
          args:
            # MySQL Variables
            mysql-max_connections: 2048
            mysql-max_allowed_packet: 4194304
            mysql-threads: 2
            mysql-default_query_delay: 0
            mysql-default_query_timeout: 36000000
            mysql-have_compress: true
            mysql-poll_timeout: 2000
            mysql-interfaces: "0.0.0.0:6033"
            mysql-default_schema: "information_schema"
            mysql-stacksize: 1048576
            mysql-server_version: "8.0.30"
            mysql-connect_timeout_server: 3000
            mysql-ping_interval_server_msec: 15000
            mysql-ping_timeout_server: 500
            mysql-commands_stats: true
            mysql-sessions_sort: true
            mysql-connect_retries_on_failure: 10
            mysql-auto_increment_delay_multiplex: 0

            # MySQL Monitor Variables
            mysql-monitor_history: 600000
            mysql-monitor_connect_interval: 5000
            mysql-monitor_ping_interval: 2000
            mysql-monitor_read_only_interval: 1500
            mysql-monitor_read_only_timeout: 500
            mysql-monitor_slave_lag_when_null: 0

            # other arges
            sync_user_period: 600000
            mysql_query_rules: |
              (
                {
                  rule_id=1
                  active=1
                  match_pattern="^SELECT .* FOR UPDATE$"
                  destination_hostgroup=0
                  apply=1
                },
                {
                  rule_id=2
                  active=1
                  match_pattern="^SELECT"
                  destination_hostgroup=1
                  apply=1
                },
                {
                  rule_id=3
                  active=1
                  match_pattern="SELECT  @@"
                  destination_hostgroup=1
                  apply=1
                },
                {
                  rule_id=4
                  active=1
                  match_pattern="show databases"
                  destination_hostgroup=1
                  apply=1
                },
              )
    - name: mysql-replicate
      values:
        replication:
          enabled: false
          from: { }
    - name: mysql-sc
      values:
        storageClassName: "{{ .Necessary.resource.mysql.volume.storageClass }}"
    - name: mysql-servicemonitor-exporter
      values: { }
    - name: mysql-servicemonitor-proxy
      values:
        proxy:
          enable: false
    - name: mysql-config
      values:
        version: "{{ .Parameters.version }}"
        resources:
          limits:
            memory: '"{{ .Necessary.resource.mysql.limits.memory }}"'
        replicaCount: "{{ .Necessary.resource.mysql.replicas }}"
        args:
          innodb_buffer_pool_size:
          max_connections:
          max_user_connections:
          sql_mode: "NO_ENGINE_SUBSTITUTION,STRICT_TRANS_TABLES,NO_AUTO_CREATE_USER,ERROR_FOR_DIVISION_BY_ZERO"
          query_cache_type:
          query_cache_size:
          socket:
          collation_server: "{{ .Necessary.collationServer }}"
          max_connect_errors:
          skip_ssl: false
          max_execution_time:
          group_concat_max_len:
          lock_wait_timeout:
          lower_case_table_names:
          thread_cache_size:
          disabled_storage_engines:
          character_set_server: "{{ .Necessary.characterSet }}"
          transaction_isolation:
          skip_name_resolve:
          explicit_defaults_for_timestamp:
          log_timestamps:
          local_infile:
          event_scheduler:
          lc_messages:
          slow_query_log: "ON"
          long_query_time:
          log_queries_not_using_indexes:
          log_throttle_queries_not_using_indexes:
          general_log:
          expire_logs_days:
          sync_binlog:
          max_binlog_size:
          binlog_format:
          binlog_rows_query_log_events:
          binlog_cache_size:
          binlog_stmt_cache_size:
          max_binlog_cache_size:
          max_binlog_stmt_cache_size:
          max_relay_log_size:
          relay_log_purge:
          relay_log_recovery:
          sync_master_info:
          slave_parallel_workers:
          read_buffer_size:
          read_rnd_buffer_size:
          sort_buffer_size:
          join_buffer_size:
          tmp_table_size:
          max_allowed_packet:
          max_heap_table_size:
          connect_timeout:
          wait_timeout: 600
          interactive_timeout: 600
          net_read_timeout:
          net_write_timeout:
          skip_external_locking:
          key_buffer_size:
          bulk_insert_buffer_size:
          concurrent_insert:
          open_files_limit:
          table_open_cache:
          table_definition_cache:
          innodb_log_file_size:
          innodb_log_files_in_group:
          innodb_undo_log_truncate:
          innodb_max_undo_log_size:
          innodb_undo_tablespaces:
          innodb_flush_log_at_trx_commit: 2
          innodb_fast_shutdown:
          innodb_flush_method:
          innodb_io_capacity:
          innodb_io_capacity_max:
          innodb_log_buffer_size:
          innodb_autoinc_lock_mode:
          innodb_buffer_pool_load_at_startup:
          innodb_buffer_pool_dump_at_shutdown:
          innodb_buffer_pool_dump_pct:
          innodb_max_dirty_pages_pct:
          innodb_lock_wait_timeout:
          innodb_old_blocks_time:
          innodb_open_files:
          innodb_page_cleaners:
          innodb_strict_mode:
          innodb_thread_concurrency:
          innodb_sort_buffer_size:
          innodb_print_all_deadlocks:
          innodb_rollback_on_timeout:
          innodb_adaptive_hash_index:
          performance_schema_max_table_instances:
          audit_record_cmds: "create_db,create_table,create_user,create_index,drop_db,drop_table,drop_user,drop_index,alter_user,alert_table,truncate,revoke,rename_table,insert,update,delete,lock_tables,unlock_tables"
          audit_whitelist_cmds:
        additionArgs:
        features:
          threadpool:
            enabled: false
          recycle:
            enabled: false
          bufferpoolControl:
            enabled: false
          auditLog:
            enabled: false
