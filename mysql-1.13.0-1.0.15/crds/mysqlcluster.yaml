apiVersion: middleware.cn/v1
kind: MiddlewareConfiguration
metadata:
  name: crd-mysqlcluster
spec:
  template: |
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name:  mysqlclusters.mysql.middleware.harmonycloud.cn
      labels:
        MiddlewareCluster: mysqlcluster
      annotations:
        harmonycloud-middleware-status-phase: 'if .metadata.annotations."middleware.maintenance.lock"=="middlewarebackup" then . + {status: (.status +  {"phase": "Recover"})} else . end'
    spec:
      group: mysql.middleware.harmonycloud.cn
      versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              x-kubernetes-preserve-unknown-fields: true
          additionalPrinterColumns:
          - name: phase
            type: string
            jsonPath: .status.phase
          - name: phaseMysql
            type: string
            jsonPath: .status.phaseMysql
          - name: phaseProxy
            type: string
            jsonPath: .status.phaseProxy
      names:
        kind: MysqlCluster
        listKind: MysqlClusterList
        plural: mysqlclusters
        shortNames:
          - mc
        singular: mysqlcluster
      scope: Namespaced
