apiVersion: middleware.cn/v1
kind: MiddlewareConfiguration
metadata:
  name: mysql-alertrule
spec:
  template: |
    apiVersion: monitoring.coreos.com/v1
    kind: PrometheusRule
    metadata:
      labels:
        prometheus: k8s
        role: alert-rules
      name: {{ .Globe.Name }}
    spec:
      groups:
      - name: mysql-exporter
        rules:
        - alert: MySQLExporterDown
          annotations:
            message: "MySQL Exporter is down. (Namespace: {{ .Globe.Namespace }},  ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: up
            product: harmonycloud
            service: metrics
          expr: up{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} == 0
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
      - name: mysql-cluster
        rules:
        - alert: MySQLReplicationNotRunning
          annotations:
            message: "MySQL slave replication (IO or SQL) has been down for more than 5 minutes. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_slave_status_slave_io_running
            product: harmonycloud
            service: metrics
          expr: mysql_slave_status_slave_io_running{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} == 0 or mysql_slave_status_slave_sql_running{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'}
            == 0
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
        - alert: MySQLReplicationLag
          annotations:
            message: "MySQL slave replication has fallen behind and is not recovering, current_value={{ `{{ $value }}` }}. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_slave_lag_seconds
            product: harmonycloud
            service: metrics
          expr: (mysql_slave_lag_seconds{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} > 30) and on(instance) (predict_linear(mysql_slave_lag_seconds{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'}[5m],
            60 * 2) > 0)
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
        - alert: MySQLInnoDBLogWaits
          annotations:
            message: "MySQL innodb logs are waiting for disk at a rate of {{`{{$value}}`}} second. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_global_status_innodb_log_waits
            product: harmonycloud
            service: metrics
            summary: MySQL innodb log writes stalling
          expr: rate(mysql_global_status_innodb_log_waits{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'}[15m]) > 10
          labels:
            severity: warning
            project: zeus
            subject: middleware
      - name: mysql-stats
        rules:
        - alert: MySQLInstanceDown
          annotations:
            message: "MySQL Instance is down. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_up
            product: harmonycloud
            service: metrics
          expr: mysql_up{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} == 0 or kube_pod_container_status_running{container="mysql", namespace='{{ .Globe.Namespace }}', pod=~"{{ .Globe.Name }}-[0-9]"} == 0
          for: 5m
          labels:
            severity: critical
            project: zeus
            subject: middleware
        - alert: MySQLOpenFilesHigh
          annotations:
            message: 'MySQL Open files is high, Please consider increasing open_files_limit, current_value={{ `{{ printf "%.0f" $value }}` }}%. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})'
            metric: mysql_global_status_innodb_num_open_files
            product: harmonycloud
            service: metrics
          expr: mysql_global_status_innodb_num_open_files{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} * 100 / (mysql_global_variables_open_files_limit{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'}) > 75
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
        - alert: MySQLReadBufferOutOfMaxAllow
          annotations:
            message: "MySQl read buffer size (read_buffer_size) is bigger than max. allowed packet size (max_allowed_packet).This can break your replication. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_global_variables_read_buffer_size
            product: harmonycloud
            service: metrics
          expr: mysql_global_variables_read_buffer_size{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} > mysql_global_variables_slave_max_allowed_packet{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'}
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
        - alert: MySQLTooManyConnections
          annotations:
            alertLevel: warning
            message: 'MySQL instance used more than 80% of max connections limited, current_value={{ `{{ printf "%.0f" $value }}` }}%. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})'
            metric: mysql_global_status_max_used_connections
            product: harmonycloud
            service: metrics
          expr: mysql_global_status_max_used_connections{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} * 100/ mysql_global_variables_max_connections{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} > 80
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
        - alert: MySQLIOThreadStopped
          annotations:
            message: "MySQL instance IO thread has stopped. This is usually because it cannot connect to the Master any more. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_slave_status_slave_io_running
            product: harmonycloud
            service: metrics
          expr: mysql_slave_status_slave_io_running{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} != 1
          for: 5m
          labels:
            severity: critical
            project: zeus
            subject: middleware
        - alert: MySQLSQLThreadStopped
          annotations:
            message: "MySQL instance SQL thread has stopped. This is usually because it cannot apply a SQL statement received from the master. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_slave_status_slave_sql_running
            product: harmonycloud
            service: metrics
          expr: mysql_slave_status_slave_sql_running{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} == 0
          for: 5m
          labels:
            severity: critical
            project: zeus
            subject: middleware
        - alert: MySQLSQLThreadError
          annotations:
            message: "MySQL instance SQL thread has stopped. This is usually because it cannot apply a SQL statement received from the master. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_slave_status_slave_sql_running
            product: harmonycloud
            service: metrics
          expr: mysql_slave_status_slave_sql_running{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} != 1
          for: 5m
          labels:
            severity: critical
            project: zeus
            subject: middleware
        - alert: MySQLSlaveLaggingBehindMaster
          annotations:
            message: "MySQL instance Slave is lagging behind Master. Please check if Slave threads are running and if there are some performance issues, current_value={{ `{{ $value }}` }}. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: mysql_slave_status_seconds_behind_master
            product: harmonycloud
            service: metrics
          expr: mysql_slave_status_seconds_behind_master{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'} > 30
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
        - alert: MySQLVolumeUsage70
          expr:  (100 * kube_persistentvolumeclaim_info{namespace='{{ .Globe.Namespace }}', persistentvolumeclaim=~"mysql-data-{{ .Globe.Name }}-[0-9]"}) * on(volumename) group_left max(label_replace ((used_size_kb / total_size_kb),"volumename", "$1", "pv", "(.+)")) by (volumename) > 70
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
          annotations:
            product: harmonycloud
            message: 'The disk usage of MySQL has exceeded 70%, current_value={{ `{{ printf "%.0f" $value }}` }}%.  (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Persistentvolumeclaim: {{`{{ $labels.persistentvolumeclaim }}`}})'
    
        - alert: MySQLVolumeUsage85
          expr: (100 * kube_persistentvolumeclaim_info{namespace='{{ .Globe.Namespace }}', persistentvolumeclaim=~"mysql-data-{{ .Globe.Name }}-[0-9]"}) * on(volumename) group_left max(label_replace ((used_size_kb / total_size_kb),"volumename", "$1", "pv", "(.+)")) by (volumename) > 85
          for: 5m
          labels:
            severity: critical
            project: zeus
            subject: middleware
          annotations:
            product: harmonycloud
            message: 'The disk usage of MySQL has exceeded 85%, current_value={{ `{{ printf "%.0f" $value }}` }}%.  (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Persistentvolumeclaim: {{`{{ $labels.persistentvolumeclaim }}`}})'
    
        - alert: MySQLFailOver
          annotations:
            message: 'The MySQL instance occurs Master-slave switchover or failover. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}'
          expr: delta(mysql_global_variables_read_only{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]'}[5m]) > 0
          for: 20s
          labels:
            severity: warning
            project: zeus
            subject: middleware
    
        - alert: MySQLWorkingSetMemoryUsageHigh95
          annotations:
            message: 'The workingSet memory(include Active Pages in the File System Cache) usage of MySQL has exceeded 95%, current_value={{ `{{ printf "%.0f" $value }}` }}%.  (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})'
          expr: sum(container_memory_working_set_bytes{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]',endpoint!="",container="mysql"}) by (pod) * 100 / sum(kube_pod_container_resource_requests{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]',resource="memory",container="mysql"}) by (pod) > 95
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
    
        - alert: MySQLRSSMemoryUsageHigh80
          annotations:
            message: 'The rss memory usage of MySQL has exceeded 80%, current_value={{ `{{ printf "%.0f" $value }}` }}%.  (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})'
          expr: sum(container_memory_rss{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]',endpoint!="",container="mysql"}) by (pod) * 100 / sum(kube_pod_container_resource_requests{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]',resource="memory",container="mysql"}) by (pod) > 80
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
    
        - alert: MySQLCpuUsageHigh
          annotations:
            message: 'The cpu usage of MySQL has exceeded 90%, current_value={{ `{{ printf "%.0f" $value }}` }}%.  (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})'
          expr: sum(rate (container_cpu_usage_seconds_total{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]',endpoint!="",container="mysql"}[5m]) ) by (pod) * 100 / sum(kube_pod_container_resource_requests{namespace='{{ .Globe.Namespace }}',pod=~'{{ .Globe.Name }}-[0-9]',resource="cpu",container="mysql"}) by (pod)  > 90
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
      {{- if .Values.proxy.enable }}
      - name: proxysql
        rules:
        - alert: ProxySqlInstanceDown
          annotations:
            message: "MySQL ProxySQL is down. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: up
            product: harmonycloud
            service: metrics
          expr: up{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}'}== 0 or kube_pod_container_status_running{container="proxysql", pod=~"{{ .Globe.Name }}-proxy.*"} == 0
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
        - alert: ProxySqlConnectCheckErr
          annotations:
            message: "MySQL ProxySQL connect check err. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: up
            product: harmonycloud
            service: metrics
          expr: irate(proxysql_mysql_monitor_connect_check_total{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}', status="err"}[5m]) > 0
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
        - alert: ProxySqlPinCheckErr
          annotations:
            message: "MySQL ProxySQL ping check err. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: up
            product: harmonycloud
            service: metrics
          expr: irate(proxysql_mysql_monitor_ping_check_total{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}',status="err"}[5m]) > 0
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
        - alert: ProxySqlReadOnlyCheckErr
          annotations:
            message: "MySQL ProxySQL read only check err. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: up
            product: harmonycloud
            service: metrics
          expr: irate(proxysql_mysql_monitor_read_only_check_total{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}',status="err"}[5m]) > 0
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
        - alert: ProxySqlReplicationLagCheckErr
          annotations:
            message: "MySQL ProxySQL replication lag check err. (Namespace: {{ .Globe.Namespace }}, ServiceName: {{ .Globe.Name }}, Pod: {{`{{ $labels.pod }}`}})"
            metric: up
            product: harmonycloud
            service: metrics
          expr: irate(proxysql_mysql_monitor_replication_lag_check_total{namespace='{{ .Globe.Namespace }}', service='{{ .Globe.Name }}', status="err"}[5m]) >0
          for: 5m
          labels:
            severity: warning
            project: zeus
            subject: middleware
    {{- end }}